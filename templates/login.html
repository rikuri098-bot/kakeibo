<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | 家計簿アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>input{font-size:16px;}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 to-purple-50 flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">💰</div>
      <h1 class="text-2xl font-bold text-indigo-600">家計簿アプリ</h1>
      <p class="text-sm text-gray-400 mt-1">ログインしてください</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="mb-4 p-3 rounded-lg text-sm
          {% if category == 'error' %}bg-red-50 text-red-600 border border-red-200
          {% else %}bg-green-50 text-green-600 border border-green-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login" class="bg-white rounded-2xl shadow-lg p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="username">ユーザー名</label>
        <input id="username" name="username" type="text" autocomplete="username" required
          placeholder="username"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-transparent transition" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="password">パスワード</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
          placeholder="••••••••"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-transparent transition" />
      </div>
      <button type="submit"
        class="w-full bg-indigo-500 hover:bg-indigo-600 active:scale-95 text-white font-semibold py-3 rounded-xl transition-all text-sm">
        ログイン
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      アカウントをお持ちでないですか？
      <a href="/register" class="text-indigo-600 font-semibold hover:underline">アカウントを作成</a>
    </p>
  </div>

</body>
</html>
